<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e8d5c8;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .page {
    width: 100%;
    max-width: 420px;
    min-height: 100vh;
    background: #F2E0D2;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 64px;
    position: relative;
    overflow: hidden;
  }

  .top-band {
    width: 100%;
    height: 6px;
    background: linear-gradient(90deg, #F9CBD6, #9E182B, #F2AFBC, #9E182B, #F9CBD6);
    opacity: 0;
    animation: fadeIn 0.6s ease 0.1s forwards;
  }

  .logo-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 40px 28px 0;
    opacity: 0;
    animation: slideDown 0.7s ease 0.2s forwards;
  }

  .logo-ring {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    border: 1.5px solid #F2AFBC;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff8f5;
    position: relative;
  }

  .logo-ring::before {
    content: '';
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background: #9E182B;
  }

  .logo-ring svg {
    position: relative;
    z-index: 1;
    width: 32px;
    height: 32px;
  }

  .brand-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 600;
    color: #9E182B;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .brand-tagline {
    font-size: 11px;
    color: #c48a97;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 300;
    margin-top: -8px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    width: calc(100% - 56px);
    opacity: 0;
    animation: fadeIn 0.6s ease 0.45s forwards;
  }

  .divider-line {
    flex: 1;
    height: 0.5px;
    background: #F2AFBC;
  }

  .divider-diamond {
    width: 6px;
    height: 6px;
    background: #9E182B;
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  /* PRODUCT — aspect-ratio 4/3 como na versão anterior */
  .product-area {
    width: calc(100% - 48px);
    opacity: 0;
    animation: slideUp 0.7s ease 0.35s forwards;
  }

  .product-frame {
    width: 100%;
    aspect-ratio: 4/3;
    border-radius: 16px;
    background: #F9CBD6;
    position: relative;
    overflow: hidden;
    border: 1px solid #F2AFBC;
  }

  .product-inner {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }

  .product-inner svg {
    width: 52px;
    height: 52px;
    stroke: #c48a97;
    fill: none;
    stroke-width: 1;
  }

  .product-label {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    color: #c48a97;
    letter-spacing: 0.05em;
  }

  .product-info {
    width: calc(100% - 56px);
    text-align: center;
    opacity: 0;
    animation: slideUp 0.7s ease 0.5s forwards;
  }

  .product-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: #9E182B;
    margin-bottom: 6px;
  }

  .product-desc {
    font-size: 13px;
    color: #b07080;
    font-weight: 300;
    line-height: 1.7;
    letter-spacing: 0.01em;
  }

  .cta-area {
    width: calc(100% - 56px);
    display: flex;
    flex-direction: column;
    gap: 12px;
    opacity: 0;
    animation: slideUp 0.7s ease 0.6s forwards;
  }

  .cta-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    padding: 19px 28px;
    background: #9E182B;
    color: #F9CBD6;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border: none;
    border-radius: 100px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  }

  .cta-btn:hover {
    background: #7a1120;
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(158,24,43,0.25);
  }

  .cta-btn:active { transform: scale(0.97); }

  .cta-btn svg {
    width: 18px;
    height: 18px;
    fill: #F9CBD6;
    flex-shrink: 0;
  }

  .cta-sub {
    text-align: center;
    font-size: 11px;
    color: #c48a97;
    letter-spacing: 0.06em;
  }

  .petals {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 80px;
    pointer-events: none;
    opacity: 0.18;
  }

  @keyframes fadeIn  { to { opacity: 1; } }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (min-width: 421px) {
    body { background: #ddc8ba; }
    .page { box-shadow: 0 0 60px rgba(100,20,30,0.12); }
  }
</style>
